<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Словообразование · ЕГЭ</title>
<style>
  :root{
    --bg:#F5F6F8; --surface:#FFFFFF; --ink:#161A20; --muted:#6A727E; --line:#E7E9ED;
    --primary:#4338CA; --primary-soft:#EEF0FF;
    --ok:#0E8A5F; --ok-soft:#E6F5EE; --bad:#D63A3A; --bad-soft:#FBEBEB; --gold:#C0750F;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, "Liberation Mono", monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    font-family:var(--sans); background:var(--bg); color:var(--ink);
    -webkit-font-smoothing:antialiased; line-height:1.45;
    padding:18px 16px calc(28px + env(safe-area-inset-bottom));
    min-height:100vh;
  }
  .app{ max-width:560px; margin:0 auto; }

  /* top bar */
  .topbar{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:18px; }
  .brand{ display:flex; align-items:baseline; gap:10px; min-width:0; }
  .brand .t{ font-family:var(--mono); font-weight:600; font-size:13px; letter-spacing:.14em; color:var(--ink); text-transform:uppercase; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .tag{ font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.1em; color:var(--primary); background:var(--primary-soft); padding:3px 7px; border-radius:6px; }
  .topbtns{ display:flex; gap:6px; flex:none; }
  .iconbtn{ font-family:var(--sans); font-size:13px; color:var(--muted); background:transparent; border:1px solid var(--line); border-radius:9px; padding:6px 10px; cursor:pointer; transition:.15s; }
  .iconbtn:hover{ color:var(--ink); border-color:#cfd3da; }

  /* progress */
  .progwrap{ margin-bottom:14px; }
  .progtop{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:7px; }
  .progtop .lbl{ font-size:12.5px; color:var(--muted); }
  .progtop .lbl b{ color:var(--ink); font-variant-numeric:tabular-nums; }
  .track{ height:7px; background:#E9EBEF; border-radius:99px; overflow:hidden; }
  .fill{ height:100%; width:0%; background:linear-gradient(90deg,#5B50E6,var(--primary)); border-radius:99px; transition:width .4s cubic-bezier(.4,0,.2,1); }

  /* stats */
  .stats{ display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
  .pill{ flex:1 1 0; min-width:74px; background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:9px 10px; text-align:center; }
  .pill .v{ font-family:var(--mono); font-weight:700; font-size:18px; font-variant-numeric:tabular-nums; line-height:1.1; }
  .pill .k{ font-size:10.5px; color:var(--muted); letter-spacing:.06em; text-transform:uppercase; margin-top:3px; }
  .v.ok{ color:var(--ok); } .v.bad{ color:var(--bad); } .v.gold{ color:var(--gold); }

  /* card */
  .card{ background:var(--surface); border:1px solid var(--line); border-radius:20px; padding:30px 22px 26px; box-shadow:0 1px 2px rgba(20,24,32,.04), 0 14px 30px -22px rgba(20,24,32,.18); }
  .eyebrow{ text-align:center; font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:var(--gold); margin-bottom:14px; }
  .root{ text-align:center; font-family:var(--mono); font-weight:700; font-size:clamp(30px,9vw,46px); letter-spacing:.1em; line-height:1; color:var(--ink); word-break:break-word; }
  .root-tr{ text-align:center; font-family:var(--sans); font-size:14px; color:var(--muted); margin-top:8px; line-height:1.3; }
  .root-tr:empty{ display:none; }
  .arrow{ text-align:center; color:#C4C9D1; font-size:22px; margin:14px 0 12px; line-height:1; }

  .maskrow{ display:flex; align-items:center; justify-content:center; gap:10px; flex-wrap:wrap; margin-bottom:14px; }
  .mask{ display:flex; gap:6px; flex-wrap:wrap; justify-content:center; }
  .slot{ font-family:var(--mono); font-weight:700; font-size:clamp(20px,6.5vw,30px); width:.84em; text-align:center; color:var(--ink); }
  .slot.dot{ color:#C7CCD4; }
  .slot.ok{ color:var(--ok); }
  .lenbadge{ font-family:var(--mono); font-size:12px; color:var(--muted); background:#F0F1F4; border-radius:7px; padding:3px 7px; align-self:center; }
  .mask-tr{ text-align:center; font-family:var(--sans); font-size:16px; font-weight:600; color:var(--ink); margin:0 0 20px; line-height:1.35; }
  .mask-tr:empty{ display:none; }
  .mask-tr::before{ content:"значение"; display:block; font-family:var(--mono); font-size:10px; font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:var(--gold); margin-bottom:5px; }
  .mask.resolved .slot{ animation:pop .26s ease both; animation-delay:calc(var(--i,0) * 28ms); }
  @keyframes pop{ from{opacity:0; transform:translateY(4px) scale(.92);} to{opacity:1; transform:none;} }

  /* input + actions */
  .field{ position:relative; margin-bottom:12px; }
  #answer{
    width:100%; font-family:var(--mono); font-weight:700; font-size:22px; letter-spacing:.06em;
    text-align:center; text-transform:uppercase; color:var(--ink);
    padding:15px 14px; border:2px solid var(--line); border-radius:13px; background:#FCFCFD; outline:none; transition:.15s;
  }
  #answer::placeholder{ color:#C2C7CF; letter-spacing:.02em; font-weight:600; text-transform:none; }
  #answer:focus{ border-color:var(--primary); background:#fff; box-shadow:0 0 0 4px var(--primary-soft); }
  #answer.ok{ border-color:var(--ok); background:var(--ok-soft); box-shadow:none; }
  #answer.bad{ border-color:var(--bad); background:var(--bad-soft); box-shadow:none; }
  #answer:disabled{ opacity:1; }
  .shake{ animation:shake .4s; }
  @keyframes shake{ 10%,90%{transform:translateX(-2px)} 20%,80%{transform:translateX(3px)} 30%,50%,70%{transform:translateX(-5px)} 40%,60%{transform:translateX(5px)} }

  .actions{ display:flex; gap:10px; }
  .btn{ font-family:var(--sans); font-size:16px; font-weight:600; border-radius:13px; padding:14px 16px; cursor:pointer; border:1px solid transparent; transition:.15s; }
  .btn.primary{ flex:1; background:var(--primary); color:#fff; }
  .btn.primary:hover{ background:#3A30B5; }
  .btn.primary:active{ transform:translateY(1px); }
  .btn.ghost{ background:transparent; color:var(--muted); border-color:var(--line); }
  .btn.ghost:hover{ color:var(--ink); border-color:#cfd3da; }
  .btn.ghost.hidden{ display:none; }

  /* feedback */
  .feedback{ min-height:22px; margin-top:16px; text-align:center; font-size:15px; display:flex; align-items:center; justify-content:center; gap:9px; flex-wrap:wrap; }
  .feedback.ok{ color:var(--ok); font-weight:600; }
  .feedback.bad{ color:var(--bad); }
  .feedback.note{ color:var(--gold); }
  .feedback b{ color:var(--ink); font-family:var(--mono); letter-spacing:.04em; }
  .feedback s{ color:var(--bad); opacity:.8; font-family:var(--mono); }
  .feedback .sub{ color:var(--muted); font-weight:400; font-size:13px; }
  .speak{ background:transparent; border:1px solid var(--line); border-radius:8px; padding:3px 8px; cursor:pointer; font-size:14px; line-height:1; color:var(--muted); }
  .speak:hover{ color:var(--ink); border-color:#cfd3da; }
  .hint{ text-align:center; color:#9AA1AB; font-size:12px; margin-top:14px; }

  /* summary */
  .summary{ background:var(--surface); border:1px solid var(--line); border-radius:20px; padding:30px 24px; text-align:center; box-shadow:0 14px 30px -22px rgba(20,24,32,.2); }
  .summary h2{ margin:0 0 4px; font-size:24px; font-weight:700; letter-spacing:-.01em; }
  .summary .lead{ color:var(--muted); margin:0 0 22px; font-size:14.5px; }
  .sumgrid{ display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:24px; }
  .sumcell{ background:#FAFBFC; border:1px solid var(--line); border-radius:13px; padding:14px; }
  .sumcell .v{ font-family:var(--mono); font-weight:700; font-size:24px; font-variant-numeric:tabular-nums; }
  .sumcell .k{ font-size:11.5px; color:var(--muted); margin-top:4px; }
  .sumbtns{ display:flex; flex-direction:column; gap:10px; }
  .hidden{ display:none !important; }
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="brand">
      <span class="t">Словообразование</span>
      <span class="tag">ЕГЭ</span>
    </div>
    <div class="topbtns">
      <button class="iconbtn" id="resultsBtn" title="Показать итоги">Итоги</button>
      <button class="iconbtn" id="resetBtn" title="Начать заново">↻</button>
    </div>
  </div>

  <section id="practice">
    <div class="progwrap">
      <div class="progtop">
        <span class="lbl">освоено <b id="doneCount">0</b> / <b id="totalCount">0</b></span>
        <span class="lbl"><b id="pctLabel">0%</b></span>
      </div>
      <div class="track"><div class="fill" id="bar"></div></div>
    </div>

    <div class="stats">
      <div class="pill"><div class="v ok" id="stCorrect">0</div><div class="k">верно</div></div>
      <div class="pill"><div class="v bad" id="stWrong">0</div><div class="k">ошибок</div></div>
      <div class="pill"><div class="v gold" id="stStreak">0</div><div class="k">серия</div></div>
      <div class="pill"><div class="v" id="stAcc">—</div><div class="k">точность</div></div>
    </div>

    <div class="card">
      <div class="eyebrow">образуйте слово от</div>
      <div class="root" id="root">—</div>
      <div class="root-tr" id="rootTr"></div>
      <div class="arrow">↓</div>
      <div class="maskrow">
        <div class="mask" id="mask"></div>
        <span class="lenbadge" id="lenbadge"></span>
      </div>
      <div class="mask-tr" id="maskTr"></div>

      <div class="field">
        <input id="answer" type="text" inputmode="text" autocomplete="off"
               autocorrect="off" autocapitalize="characters" spellcheck="false"
               placeholder="введите слово" aria-label="Ваш ответ">
      </div>

      <div class="actions">
        <button class="btn primary" id="checkBtn">Проверить</button>
        <button class="btn ghost" id="dunnoBtn">Не знаю</button>
      </div>

      <div class="feedback" id="feedback" role="status" aria-live="polite"></div>
      <div class="hint" id="hint">Enter — проверить</div>
    </div>
  </section>

  <section id="summary" class="summary hidden">
    <h2 id="sumTitle">Итоги</h2>
    <p class="lead" id="sumLead"></p>
    <div class="sumgrid">
      <div class="sumcell"><div class="v" id="sumDone">0</div><div class="k">освоено</div></div>
      <div class="sumcell"><div class="v" id="sumAcc">—</div><div class="k">точность</div></div>
      <div class="sumcell"><div class="v" id="sumBest">0</div><div class="k">лучшая серия</div></div>
      <div class="sumcell"><div class="v" id="sumTime">0:00</div><div class="k">время</div></div>
    </div>
    <div class="sumbtns">
      <button class="btn primary" id="contBtn">Продолжить</button>
      <button class="btn ghost" id="reviewBtn">Повторить ошибки</button>
      <button class="btn ghost" id="restartBtn">Начать заново (все <span id="restartCount">0</span>)</button>
    </div>
  </section>

</div>

a":"WIDTH","at":"ширина"},{"b":"WILL","bt":"воля; будет (вспом. глагол)","a":"UNWILLING","at":"нежелающий, неохотный"},{"b":"WILL","bt":"воля; будет (вспом. глагол)","a":"UNWILLINGNESS","at":"нежелание"},{"b":"WILL","bt":"воля; будет (вспом. глагол)","a":"WILLING","at":"готовый, охотно делающий"},{"b":"WILL","bt":"воля; будет (вспом. глагол)","a":"WILLINGNESS","at":"готовность, охота"},{"b":"WILLING","bt":"готовый, охотно делающий","a":"WILLINGLY","at":"охотно"},{"b":"WIN","bt":"выигрывать, побеждать","a":"WINNER","at":"победитель","x":["WINNERS"]},{"b":"WIND","bt":"ветер; виться, заводить","a":"WINDY","at":"ветреный"},{"b":"WONDER","bt":"чудо; удивляться, интересоваться","a":"WONDERFUL","at":"замечательный, чудесный"},{"b":"WORLD","bt":"мир","a":"WORLDWIDE","at":"всемирный, по всему миру"},{"b":"WRITE","bt":"писать","a":"REWRITE","at":"переписывать"},{"b":"WRITE","bt":"писать","a":"WRITER","at":"писатель"},{"b":"YEAR","bt":"год","a":"YEARLY","at":"ежегодный; ежегодно"}];

// ---------- build items ----------
const items = RAW_ITEMS.map(o => {
  const a = o.a;
  const accepts = new Set([a].concat(o.x || []));
  return {
    id: o.b + "|" + a, base: o.b, answer: a, accepts: accepts,
    baseTr: o.bt || "", answerTr: o.at || "",
    first: a[0], last: a[a.length - 1], len: a.length,
    sig: a[0] + a[a.length - 1] + a.length
  };
});
const byId = new Map(items.map(it => [it.id, it]));
const fam = new Map();
for (const it of items){ if(!fam.has(it.base)) fam.set(it.base, []); fam.get(it.base).push(it); }
const ALL_IDS = items.map(it => it.id);

// ---------- DOM ----------
const $ = id => document.getElementById(id);
const elRoot=$("root"), elMask=$("mask"), elLen=$("lenbadge"), elInput=$("answer");
const elCheck=$("checkBtn"), elDunno=$("dunnoBtn"), elFeedback=$("feedback"), elHint=$("hint");
const elBar=$("bar"), elDone=$("doneCount"), elTotal=$("totalCount"), elPct=$("pctLabel");
const elC=$("stCorrect"), elW=$("stWrong"), elS=$("stStreak"), elA=$("stAcc");
const practice=$("practice"), summary=$("summary");

// ---------- state ----------
let queue=[], missed=new Set(), counts={correct:0,wrong:0};
let streak=0, best=0, startTime=0, sessionTotal=0;
let state="answer", current=null, lastResult=null, advTimer=null;

function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function normalize(s){ return (s||"").trim().toUpperCase().replace(/[^A-Z]/g,""); }
function fmtTime(ms){ const s=Math.floor(ms/1000); return Math.floor(s/60)+":"+String(s%60).padStart(2,"0"); }

function startSession(ids){
  clearTimeout(advTimer);
  queue = shuffle(ids.slice());
  sessionTotal = queue.length;
  missed = new Set(); counts={correct:0,wrong:0}; streak=0; best=0; startTime=Date.now();
  summary.classList.add("hidden"); practice.classList.remove("hidden");
  renderStats(); nextCard();
}

function nextCard(){
  clearTimeout(advTimer);
  if(queue.length===0){ showSummary(true); return; }
  current = byId.get(queue[0]);
  state="answer"; lastResult=null;
  elInput.value=""; elInput.disabled=false; elInput.className="";
  elFeedback.textContent=""; elFeedback.className="feedback";
  elCheck.textContent="Проверить"; elDunno.classList.remove("hidden");
  elHint.textContent="Enter — проверить";
  elRoot.textContent = current.base;
  $("rootTr").textContent = current.baseTr;
  $("maskTr").textContent = current.answerTr;
  renderMask(false);
  renderProgress();
  try{ elInput.focus(); }catch(e){}
}

function renderMask(resolved){
  elMask.className = "mask" + (resolved ? " resolved" : "");
  elMask.innerHTML = "";
  const w = current.answer;
  for(let i=0;i<current.len;i++){
    const span=document.createElement("span");
    span.style.setProperty("--i", i);
    if(resolved){ span.className="slot ok"; span.textContent=w[i]; }
    else if(i===0 || i===current.len-1){ span.className="slot"; span.textContent=w[i]; }
    else { span.className="slot dot"; span.textContent="·"; }
    elMask.appendChild(span);
  }
  elLen.textContent = current.len + " букв";
}

function renderProgress(){
  const done = sessionTotal - queue.length;
  const pct = sessionTotal ? Math.round(done/sessionTotal*100) : 0;
  elBar.style.width = pct + "%";
  elDone.textContent = done; elTotal.textContent = sessionTotal; elPct.textContent = pct + "%";
}
function renderStats(){
  elC.textContent=counts.correct; elW.textContent=counts.wrong;
  elS.textContent = streak>0 ? ("🔥 "+streak) : "0";
  const tot=counts.correct+counts.wrong;
  elA.textContent = tot ? Math.round(counts.correct/tot*100)+"%" : "—";
}

function check(){
  if(state==="feedback"){ advance(); return; }
  const norm = normalize(elInput.value);
  if(!norm){ elInput.classList.remove("shake"); void elInput.offsetWidth; elInput.classList.add("shake"); return; }
  let ok = current.accepts.has(norm), alt=false;
  if(!ok){
    for(const f of fam.get(current.base)){
      if(f.sig===current.sig && f.accepts.has(norm)){ ok=true; alt=true; break; }
    }
  }
  if(ok){
    counts.correct++; streak++; best=Math.max(best,streak);
    lastResult={ok:true, alt:alt};
  } else {
    counts.wrong++; streak=0; missed.add(current.id);
    lastResult={ok:false, typed:elInput.value.trim()};
  }
  enterFeedback();
}

function dunno(){
  if(state==="feedback"){ advance(); return; }
  counts.wrong++; streak=0; missed.add(current.id);
  lastResult={ok:false, revealed:true};
  enterFeedback();
}

function enterFeedback(){
  state="feedback";
  elInput.disabled=true;
  elInput.classList.remove("shake");
  elInput.classList.add(lastResult.ok ? "ok" : "bad");
  renderMask(true);
  elDunno.classList.add("hidden");
  elCheck.textContent="Дальше →";

  const pron = "<button class='speak' id='speakBtn' title='Произнести' aria-label='Произнести'>🔊</button>";
  if(lastResult.ok){
    elFeedback.className="feedback ok";
    elFeedback.innerHTML = (lastResult.alt ? "✓ верно <span class='sub'>— другая форма этого слова</span> " : "✓ верно ") + pron;
    elHint.textContent="Enter / пробел — дальше";
    advTimer = setTimeout(()=>{ if(state==="feedback") advance(); }, 1100);
  } else if(lastResult.revealed){
    elFeedback.className="feedback note";
    elFeedback.innerHTML = "Правильно: <b>"+current.answer+"</b> "+pron;
    elHint.textContent="Enter / пробел — дальше";
  } else {
    elFeedback.className="feedback bad";
    const typed = lastResult.typed ? " <span class='sub'>· вы ввели</span> <s>"+escapeHtml(lastResult.typed)+"</s>" : "";
    elFeedback.innerHTML = "✗ Правильно: <b>"+current.answer+"</b>"+typed+" "+pron;
    elHint.textContent="Enter / пробел — дальше";
  }
  const sb=$("speakBtn"); if(sb) sb.addEventListener("click", e=>{ e.preventDefault(); speak(current.answer); });
  renderStats();
}

function advance(){
  clearTimeout(advTimer);
  const id = queue.shift();
  if(lastResult && !lastResult.ok) queue.push(id);   // requeue misses
  renderProgress();
  nextCard();
}

function speak(word){
  try{
    if(!("speechSynthesis" in window)) return;
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(word.toLowerCase());
    u.lang="en-US"; u.rate=0.9;
    speechSynthesis.speak(u);
  }catch(e){}
}
function escapeHtml(s){ return s.replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

// ---------- summary ----------
function showSummary(finished){
  clearTimeout(advTimer);
  const done = sessionTotal - queue.length;
  const tot = counts.correct+counts.wrong;
  $("sumTitle").textContent = finished ? "Готово! 🎉" : "Итоги";
  $("sumLead").textContent = finished
    ? "Вы прошли все слова в этой подборке."
    : "Промежуточный результат — можно продолжить.";
  $("sumDone").textContent = done + " / " + sessionTotal;
  $("sumAcc").textContent = tot ? Math.round(counts.correct/tot*100)+"%" : "—";
  $("sumBest").textContent = best;
  $("sumTime").textContent = fmtTime(Date.now()-startTime);

  $("contBtn").style.display = (finished || queue.length===0) ? "none" : "block";
  const rb=$("reviewBtn");
  if(missed.size>0){ rb.style.display="block"; rb.textContent="Повторить ошибки ("+missed.size+")"; }
  else rb.style.display="none";

  practice.classList.add("hidden"); summary.classList.remove("hidden");
}

// ---------- events ----------
elCheck.addEventListener("click", ()=> state==="answer" ? check() : advance());
elDunno.addEventListener("click", dunno);
elInput.addEventListener("keydown", e=>{ if(e.key==="Enter"){ e.preventDefault(); check(); } });

document.addEventListener("keydown", e=>{
  if(!summary.classList.contains("hidden")) return;
  if(state==="feedback" && (e.key==="Enter" || e.key===" " || e.key==="ArrowRight")){
    e.preventDefault(); advance();
  }
});

$("resultsBtn").addEventListener("click", ()=> showSummary(false));
$("resetBtn").addEventListener("click", ()=>{ if(confirm("Начать заново с самого начала?")) startSession(ALL_IDS); });
$("contBtn").addEventListener("click", ()=>{ summary.classList.add("hidden"); practice.classList.remove("hidden"); if(state==="answer"){ try{elInput.focus();}catch(e){} } });
$("reviewBtn").addEventListener("click", ()=> startSession([...missed]));
$("restartBtn").addEventListener("click", ()=> startSession(ALL_IDS));

// ---------- go ----------
$("restartCount").textContent = ALL_IDS.length;
startSession(ALL_IDS);
</script>
</body>
</html>
